<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semiconductor Supply Chain Disruption Simulation And Diagnostic Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
            padding: 60px 40px;
            text-align: center;
        }
        
        h1 {
            color: #333;
            font-size: 3em;
            margin-bottom: 15px;
        }
        
        h2 {
            color: #667eea;
            font-size: 1.5em;
            font-weight: normal;
            margin-bottom: 30px;
        }
        
        .synopsis {
            color: #666;
            font-size: 1.1em;
            line-height: 1.8;
            margin-bottom: 40px;
            font-style: italic;
        }
        
        .start-btn {
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Georgia', serif;
        }
        
        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .start-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Semiconductor Supply Chain Disruption Simulation And Diagnostic Tool</h1>
        <h2></h2>
        <p class="synopsis">Navigate a complex semiconductor supply chain disruption and learn decision-making strategies.</p>
        <button class="start-btn" onclick="window.location.href='page1.html'">Begin Adventure</button> 
    </div>
</body>
</html>
